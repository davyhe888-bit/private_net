<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>未来科技感导航页</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    /* 基础重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 未来感背景 + 鼠标互动特效 */
    body {
      min-height: 100vh;
      /* 调亮的科技蓝渐变，不刺眼 */
      background: linear-gradient(135deg, #1a2980 0%, #26d0ce 100%);
      font-family: "Inter", "Microsoft YaHei", sans-serif;
      overflow-x: hidden;
      position: relative;
      /* 隐藏粒子溢出 */
      overflow: hidden;
    }

    /* 鼠标互动的粒子画布 */
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* 主容器（层级高于粒子） */
    #app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem;
      position: relative;
      z-index: 1;
    }

    /* 顶部按钮区 */
    .top-tools {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 1rem;
      margin-bottom: 3rem;
    }
    .tool-btn {
      color: #e2e8f0;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }
    .tool-btn:hover {
      color: white;
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      border: none;
      padding: 0.5rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
    }

    /* 分类标题 */
    .category-title {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 2rem 0 1.5rem 0;
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }
    .category-title i {
      color: #f0abfc;
      font-size: 1rem;
      filter: drop-shadow(0 0 5px rgba(240, 171, 252, 0.5));
    }

    /* 卡片容器 */
    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    /* 未来感卡片（保留图标动效） */
    .card-hover {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
      transition: all 0.4s ease;
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
      height: 160px;
      justify-content: center;
    }
    /* 卡片发光边框（未来感核心） */
    .card-hover::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border: 1px solid transparent;
      border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #26d0ce) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .card-hover:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }
    .card-hover:hover::before {
      opacity: 1;
    }

    /* 图标样式（保留动效，优化发光） */
    .card-hover img {
      width: 60px !important;
      height: 60px !important;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      padding: 8px;
      margin-bottom: 0.8rem;
      object-fit: contain;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
    }
    .card-hover:hover img {
      transform: rotate(5deg) scale(1.1);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
    }

    /* 卡片文字 */
    .card-hover .name {
      color: white;
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
    }
    .card-hover .desc {
      color: #e2e8f0;
      font-size: 0.75rem;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.1);
    }

    /* 编辑按钮 */
    .edit-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      color: #e2e8f0;
      background: rgba(0, 0, 0, 0.2);
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 2;
    }
    .card-hover:hover .edit-btn {
      opacity: 1;
    }
    .edit-btn:hover {
      color: #f0abfc;
      background: rgba(0, 0, 0, 0.3);
      box-shadow: 0 0 10px rgba(240, 171, 252, 0.5);
    }

    /* 弹窗样式（未来感） */
    #modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .modal-card {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(12px);
    }
    .modal-card h3 {
      color: white;
      margin: 0 0 1.5rem 0;
      font-size: 1.2rem;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }
    .modal-card label {
      color: #e2e8f0;
      font-size: 0.9rem;
      display: block;
      margin-bottom: 0.5rem;
    }
    .modal-card input, .modal-card select {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: white;
      outline: none;
      transition: all 0.3s ease;
    }
    .modal-card input:focus, .modal-card select:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
    }
    .modal-card button {
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    #delete-site {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
      border: none;
    }
    #delete-site:hover {
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
    }
    #cancel-btn {
      background: rgba(0, 0, 0, 0.2);
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    #cancel-btn:hover {
      color: white;
      border-color: #e2e8f0;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }
    #close-modal {
      color: #e2e8f0;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
    }
    #close-modal:hover {
      color: white;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <!-- 鼠标互动粒子画布 -->
  <canvas id="particle-canvas"></canvas>

  <div id="app">
    <!-- 顶部工具区 -->
    <div class="top-tools">
      <button id="import-btn" class="tool-btn flex items-center gap-1">
        <i class="fa fa-upload"></i> 导入
      </button>
      <button id="export-btn" class="tool-btn flex items-center gap-1">
        <i class="fa fa-download"></i> 导出
      </button>
      <button id="add-btn" class="btn-primary">+ 添加</button>
    </div>

    <!-- 分类容器 -->
    <div id="category-container"></div>

    <!-- 导入文件隐藏输入 -->
    <input type="file" id="import-file" accept=".json" class="hidden">

    <!-- 添加/编辑弹窗 -->
    <div id="modal">
      <div class="modal-card">
        <div class="flex justify-between items-center mb-2">
          <h3 id="modal-title">添加网址</h3>
          <button id="close-modal"><i class="fa fa-times"></i></button>
        </div>
        <form id="site-form">
          <input type="hidden" id="site-id">
          <div>
            <label>网站名称</label>
            <input type="text" id="site-name" required>
          </div>
          <div>
            <label>网站描述</label>
            <input type="text" id="site-desc" required>
          </div>
          <div>
            <label>网站地址</label>
            <input type="url" id="site-url" required>
          </div>
          <div>
            <label>图标地址</label>
            <input type="text" id="site-icon" placeholder="https://api.iowen.cn/favicon/xxx.com">
          </div>
          <div>
            <label>所属分类</label>
            <select id="site-category" required>
              <option value="常用网站">常用网站</option>
              <option value="社交媒体">社交媒体</option>
              <option value="购物网站">购物网站</option>
              <option value="娱乐网站">娱乐网站</option>
            </select>
          </div>
          <div class="flex justify-end gap-2 mt-3">
            <button type="button" id="delete-site">删除</button>
            <button type="button" id="cancel-btn">取消</button>
            <button type="submit" class="btn-primary">保存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- 鼠标互动粒子脚本（核心科技感） -->
  <script>
    // 粒子互动效果
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouse = { x: null, y: null, radius: 150 };

    // 适配窗口大小
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // 粒子类
    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = Math.random() * 0.5 - 0.25;
        this.speedY = Math.random() * 0.5 - 0.25;
        this.color = 'rgba(255, 255, 255, 0.7)';
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        // 边界反弹
        if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
        if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;

        // 鼠标互动：粒子向鼠标移动
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        let forceDirectionX = dx / distance;
        let forceDirectionY = dy / distance;
        let maxDistance = mouse.radius;
        let force = (maxDistance - distance) / maxDistance;
        if (distance < maxDistance) {
          this.x += forceDirectionX * force * 2;
          this.y += forceDirectionY * force * 2;
        }
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        // 粒子连线（未来感）
        for (let i = 0; i < particles.length; i++) {
          let dx = this.x - particles[i].x;
          let dy = this.y - particles[i].y;
          let distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < 100) {
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.2 - distance/500})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(particles[i].x, particles[i].y);
            ctx.stroke();
          }
        }
      }
    }

    // 创建粒子
    function initParticles() {
      particles = [];
      for (let i = 0; i < 100; i++) {
        particles.push(new Particle());
      }
    }
    initParticles();

    // 动画循环
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
      }
      requestAnimationFrame(animate);
    }
    animate();

    // 监听鼠标移动
    window.addEventListener('mousemove', (e) => {
      mouse.x = e.x;
      mouse.y = e.y;
    });
    // 鼠标离开时重置
    window.addEventListener('mouseout', () => {
      mouse.x = null;
      mouse.y = null;
    });
  </script>

  <script src="app.js"></script>
</body>
</html>
