<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>常用网站导航</title>
  <!-- Tailwind CSS v3 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#2563eb',
            secondary: '#64748b',
            dark: {
              bg: '#18181b',
              card: '#27272a',
              text: '#f4f4f5'
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-in-out',
            'slide-up': 'slideUp 0.4s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' }
            },
            slideUp: {
              '0%': { transform: 'translateY(10px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' }
            }
          }
        }
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .glass-effect {
        @apply backdrop-blur-sm bg-white/80 dark:bg-dark-card/80 border border-gray-200/50 dark:border-gray-700/50;
      }
      
      .card-hover {
        @apply transition-all duration-200 hover:shadow-md hover:scale-[1.02] hover:-translate-y-0.5;
      }
      
      .btn-primary {
        @apply px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors duration-200 focus:ring-2 focus:ring-primary/30 focus:outline-none;
      }
      
      .btn-secondary {
        @apply px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors duration-200 focus:ring-2 focus:ring-gray-400/30 focus:outline-none;
      }
      
      .input-field {
        @apply px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-dark-card text-gray-800 dark:text-dark-text focus:ring-2 focus:ring-primary/30 focus:border-primary dark:focus:border-primary focus:outline-none transition-all duration-200;
      }
    }
  </style>
</head>
<body class="bg-gray-100 dark:bg-dark-bg text-gray-800 dark:text-dark-text min-h-screen transition-colors duration-200">
  <div class="container mx-auto px-4 py-6 max-w-5xl">
    <!-- 头部区域 -->
    <header class="mb-8 animate-fade-in">
      <div class="flex justify-between items-center">
        <!-- 简化的logo区域 -->
        <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white">
          <i class="fa fa-link"></i>
        </div>
        
        <div class="flex items-center gap-3">
          <!-- 主题切换按钮 -->
          <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors duration-200" aria-label="切换主题">
            <i class="fa fa-sun-o dark:hidden text-yellow-500"></i>
            <i class="fa fa-moon-o hidden dark:block text-blue-300"></i>
          </button>
          
          <!-- 添加网站按钮 -->
          <button id="addSiteBtn" class="btn-primary flex items-center gap-2 text-sm">
            <i class="fa fa-plus text-sm"></i>
            <span class="hidden sm:inline">添加</span>
          </button>
        </div>
      </div>
    </header>
    
    <!-- 分类导航区域 -->
    <main>
      <!-- 常用网站 -->
      <section class="mb-8 animate-slide-up">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-medium flex items-center gap-2 text-gray-700 dark:text-gray-200">
            <i class="fa fa-star text-yellow-500 text-sm"></i>
            常用网站
          </h2>
          <button class="text-xs text-primary hover:text-primary/80 transition-colors duration-200 flex items-center gap-1 edit-category" data-category="常用网站">
            <i class="fa fa-pencil text-xs"></i>
            <span>编辑</span>
          </button>
        </div>
        
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
          <!-- 百度 -->
          <a href="https://www.baidu.com" target="_blank" class="website-card glass-effect rounded-lg p-3 flex flex-col items-center text-center card-hover group">
            <div class="w-10 h-10 rounded-lg bg-white dark:bg-dark-card flex items-center justify-center mb-2 shadow-sm">
              <img src="https://p3-doubao-search-sign.byteimg.com/labis/78209efdc96ff1b2c7273fd103f168dc~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&amp;x-expires=1791278240&amp;x-signature=tU%2B7TW28BhJ8KhN6E1JpJSqEKkk%3D" alt="百度" class="w-6 h-6 object-contain">
            </div>
            <h3 class="font-medium text-xs">百度</h3>
            <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-1 line-clamp-1">百度一下，你就知道</p>
          </a>
          
          <!-- 谷歌 -->
          <a href="https://www.google.com" target="_blank" class="website-card glass-effect rounded-lg p-3 flex flex-col items-center text-center card-hover group">
            <div class="w-10 h-10 rounded-lg bg-white dark:bg-dark-card flex items-center justify-center mb-2 shadow-sm">
              <img src="https://p3-doubao-search-sign.byteimg.com/isp-i18n-media/image/ed5bfa2d55ea4c15ad1fd00ea721a2eb~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&amp;x-expires=1791278240&amp;x-signature=hBLmmS%2BEfxASUFkvcxXMRWQlWuw%3D" alt="谷歌" class="w-6 h-6 object-contain">
            </div>
            <h3 class="font-medium text-xs">谷歌</h3>
            <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-1 line-clamp-1">全球最大搜索引擎</p>
          </a>
          
          <!-- 微信 -->
          <a href="https://wx.qq.com" target="_blank" class="website-card glass-effect rounded-lg p-3 flex flex-col items-center text-center card-hover group">
            <div class="w-10 h-10 rounded-lg bg-white dark:bg-dark-card flex items-center justify-center mb-2 shadow-sm">
              <img src="https://p3-doubao-search-sign.byteimg.com/labis/cf87df407c01649f8f9f779a7cf45291~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&amp;x-expires=1791278240&amp;x-signature=oJc482AiaOzREYhn3jkHLDFrvwg%3D" alt="微信" class="w-6 h-6 object-contain">
            </div>
            <h3 class="font-medium text-xs">微信</h3>
            <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-1 line-clamp-1">微信网页版</p>
          </a>
          
          <!-- GitHub -->
          <a href="https://github.com" target="_blank" class="website-card glass-effect rounded-lg p-3 flex flex-col items-center text-center card-hover group">
            <div class="w-10 h-10 rounded-lg bg-white dark:bg-dark-card flex items-center justify-center mb-2 shadow-sm">
              <img src="https://p26-doubao-search-sign.byteimg.com/labis/b1da7251ffd5758e9b9a34d4c56000a9~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&amp;x-expires=1791278240&amp;x-signature=fWJI8WVOuudnOgWekCNhAh6NieM%3D" alt="GitHub" class="w-6 h-6 object-contain">
            </div>
            <h3 class="font-medium text-xs">GitHub</h3>
            <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-1 line-clamp-1">代码托管平台</p>
          </a>
          
          <!-- B站 -->
          <a href="https://www.bilibili.com" target="_blank" class="website-card glass-effect rounded-lg p-3 flex flex-col items-center text-center card-hover group">
            <div class="w-10 h-10 rounded-lg bg-white dark:bg-dark-card flex items-center justify-center mb-2 shadow-sm">
              <img src="https://p3-doubao-search-sign.byteimg.com/labis/ec262a4746dbb567cb6c7a81098de2e4~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&amp;x-expires=1791278240&amp;x-signature=eIKCCMoCdRTLme9gGDzEtOxlCgo%3D" alt="B站" class="w-6 h-6 object-contain">
            </div>
            <h3 class="font-medium text-xs">B站</h3>
            <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-1 line-clamp-1">哔哩哔哩弹幕网</p>
          </a>
        </div>
      </section>
      
      <!-- 社交媒体 -->
      <section class="mb-8 animate-slide-up" style="animation-delay: 0.1s;">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-medium flex items-center gap-2 text-gray-700 dark:text-gray-200">
            <i class="fa fa-comments text-blue-500 text-sm"></i>
            社交媒体
          </h2>
          <button class="text-xs text-primary hover:text-primary/80 transition-colors duration-200 flex items-center gap-1 edit-category" data-category="社交媒体">
            <i class="fa fa-pencil text-xs"></i>
            <span>编辑</span>
          </button>
        </div>
        
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
          <!-- 微博 -->
          <a href="https://weibo.com" target="_blank" class="website-card glass-effect rounded-lg p-3 flex flex-col items-center text-center card-hover group">
            <div class="w-10 h-10 rounded-lg bg-white dark:bg-dark-card flex items-center justify-center mb-2 shadow-sm">
              <img src="https://p26-doubao-search-sign.byteimg.com/labis/6aa46434d4733c60de4f27bf4464f122~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&amp;x-expires=1791278266&amp;x-signature=xy8aaIpoDk7pjh6MRRp7UAMJPPE%3D" alt="微博" class="w-6 h-6 object-contain">
            </div>
            <h3 class="font-medium text-xs">微博</h3>
            <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-1 line-clamp-1">中国社交媒体平台</p>
          </a>
          
          <!-- 知乎 -->
          <a href="https://www.zhihu.com" target="_blank" class="website-card glass-effect rounded-lg p-3 flex flex-col items-center text-center card-hover group">
            <div class="w-10 h-10 rounded-lg bg-white dark:bg-dark-card flex items-center justify-center mb-2 shadow-sm">
              <img src="https://p3-doubao-search-sign.byteimg.com/labis/77e7ef0590021203d2b42f6dc9570332~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&amp;x-expires=1791278240&amp;x-signature=kQHJLLP4yriKrCyrbuGWZ2lpe0I%3D" alt="知乎" class="w-6 h-6 object-contain">
            </div>
            <h3 class="font-medium text-xs">知乎</h3>
            <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-1 line-clamp-1">知识分享平台</p>
          </a>
          
          <!-- 抖音 -->
          <a href="https://www.douyin.com" target="_blank" class="website-card glass-effect rounded-lg p-3 flex flex-col items-center text-center card-hover group">
            <div class="w-10 h-10 rounded-lg bg-white dark:bg-dark-card flex items-center justify-center mb-2 shadow-sm">
              <img src="https://p3-doubao-search-sign.byteimg.com/labis/90a45bd8410d5b685e7d3e8bc9d0ec6c~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&amp;x-expires=1791278266&amp;x-signature=ww7FASbIi%2FeSHKS70ZDku05BzDc%3D" alt="抖音" class="w-6 h-6 object-contain">
            </div>
            <h3 class="font-medium text-xs">抖音</h3>
            <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-1 line-clamp-1">短视频社交平台</p>
          </a>
        </div>
      </section>
      
      <!-- 购物网站 -->
      <section class="mb-8 animate-slide-up" style="animation-delay: 0.2s;">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-medium flex items-center gap-2 text-gray-700 dark:text-gray-200">
            <i class="fa fa-shopping-cart text-orange-500 text-sm"></i>
            购物网站
          </h2>
          <button class="text-xs text-primary hover:text-primary/80 transition-colors duration-200 flex items-center gap-1 edit-category" data-category="购物网站">
            <i class="fa fa-pencil text-xs"></i>
            <span>编辑</span>
          </button>
        </div>
        
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
          <!-- 淘宝 -->
          <a href="https://www.taobao.com" target="_blank" class="website-card glass-effect rounded-lg p-3 flex flex-col items-center text-center card-hover group">
            <div class="w-10 h-10 rounded-lg bg-white dark:bg-dark-card flex items-center justify-center mb-2 shadow-sm">
              <img src="https://p3-doubao-search-sign.byteimg.com/labis/b32c43f45b2eec98c8ec404148cd1cd8~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&amp;x-expires=1791278266&amp;x-signature=t%2FSsdBuTVYBU7bMG%2FmjQuMHvXEE%3D" alt="淘宝" class="w-6 h-6 object-contain">
            </div>
            <h3 class="font-medium text-xs">淘宝</h3>
            <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-1 line-clamp-1">中国最大电商平台</p>
          </a>
          
          <!-- 京东 -->
          <a href="https://www.jd.com" target="_blank" class="website-card glass-effect rounded-lg p-3 flex flex-col items-center text-center card-hover group">
            <div class="w-10 h-10 rounded-lg bg-white dark:bg-dark-card flex items-center justify-center mb-2 shadow-sm">
              <img src="https://p26-doubao-search-sign.byteimg.com/labis/b4c97fcc8501d26f40cb0b2131a4876a~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&amp;x-expires=1791278266&amp;x-signature=Hh4OZ3BznIMX8%2BSZBSRX7GHepFE%3D" alt="京东" class="w-6 h-6 object-contain">
            </div>
            <h3 class="font-medium text-xs">京东</h3>
            <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-1 line-clamp-1">自营式电商平台</p>
          </a>
        </div>
      </section>
      
      <!-- 娱乐网站 -->
      <section class="mb-8 animate-slide-up" style="animation-delay: 0.3s;">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-medium flex items-center gap-2 text-gray-700 dark:text-gray-200">
            <i class="fa fa-film text-purple-500 text-sm"></i>
            娱乐网站
          </h2>
          <button class="text-xs text-primary hover:text-primary/80 transition-colors duration-200 flex items-center gap-1 edit-category" data-category="娱乐网站">
            <i class="fa fa-pencil text-xs"></i>
            <span>编辑</span>
          </button>
        </div>
        
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
          <!-- 网易云音乐 -->
          <a href="https://music.163.com" target="_blank" class="website-card glass-effect rounded-lg p-3 flex flex-col items-center text-center card-hover group">
            <div class="w-10 h-10 rounded-lg bg-white dark:bg-dark-card flex items-center justify-center mb-2 shadow-sm">
              <img src="https://p26-doubao-search-sign.byteimg.com/labis/2b6e6413f04a0ff2c0d9a6cd20dce25c~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&amp;x-expires=1791278266&amp;x-signature=fgq2ihv2SSipRcY4Z%2FjCStPxdTE%3D" alt="网易云音乐" class="w-6 h-6 object-contain">
            </div>
            <h3 class="font-medium text-xs">网易云音乐</h3>
            <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-1 line-clamp-1">音乐流媒体平台</p>
          </a>
          
          <!-- 腾讯视频 -->
          <a href="https://v.qq.com" target="_blank" class="website-card glass-effect rounded-lg p-3 flex flex-col items-center text-center card-hover group">
            <div class="w-10 h-10 rounded-lg bg-white dark:bg-dark-card flex items-center justify-center mb-2 shadow-sm">
              <img src="https://p3-doubao-search-sign.byteimg.com/labis/3ef1cf39ea06f0a8f5f75b4e783e0122~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&amp;x-expires=1791278266&amp;x-signature=mtY1wolOEJwal8G8%2F4%2FAqZWAhiE%3D" alt="腾讯视频" class="w-6 h-6 object-contain">
            </div>
            <h3 class="font-medium text-xs">腾讯视频</h3>
            <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-1 line-clamp-1">视频流媒体平台</p>
          </a>
        </div>
      </section>
    </main>
    
    <!-- 底部区域 -->
    <footer class="mt-12 text-center text-gray-500 dark:text-gray-400 text-xs animate-fade-in">
      <div class="flex justify-center gap-4 mb-4">
        <button id="exportDataBtn" class="text-primary hover:text-primary/80 transition-colors duration-200 flex items-center gap-1 text-xs">
          <i class="fa fa-download text-xs"></i>
          <span>导出</span>
        </button>
        <button id="importDataBtn" class="text-primary hover:text-primary/80 transition-colors duration-200 flex items-center gap-1 text-xs">
          <i class="fa fa-upload text-xs"></i>
          <span>导入</span>
        </button>
        <input type="file" id="importDataInput" accept=".json" class="hidden">
      </div>
      <p>© 2025 导航网站</p>
    </footer>
  </div>
  
  <!-- 添加/编辑网站模态框 -->
  <div id="siteModal" class="fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center z-50 hidden animate-fade-in">
    <div class="glass-effect rounded-lg p-5 w-full max-w-md animate-slide-up">
      <div class="flex justify-between items-center mb-4">
        <h3 id="modalTitle" class="text-lg font-medium">添加网站</h3>
        <button id="closeModalBtn" class="p-1.5 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-full transition-colors duration-200">
          <i class="fa fa-times text-sm"></i>
        </button>
      </div>
      
      <form id="siteForm">
        <input type="hidden" id="siteId">
        
        <div class="mb-3">
          <label for="siteName" class="block text-xs font-medium mb-1.5">网站名称</label>
          <input type="text" id="siteName" class="input-field w-full text-sm" required>
        </div>
        
        <div class="mb-3">
          <label for="siteUrl" class="block text-xs font-medium mb-1.5">网站链接</label>
          <input type="url" id="siteUrl" class="input-field w-full text-sm" placeholder="https://" required>
        </div>
        
        <div class="mb-3">
          <label for="siteDescription" class="block text-xs font-medium mb-1.5">网站描述</label>
          <input type="text" id="siteDescription" class="input-field w-full text-sm">
        </div>
        
        <div class="mb-3">
          <label for="siteIcon" class="block text-xs font-medium mb-1.5">网站图标</label>
          <input type="url" id="siteIcon" class="input-field w-full text-sm" placeholder="https://">
        </div>
        
        <div class="mb-4">
          <label for="siteCategory" class="block text-xs font-medium mb-1.5">分类</label>
          <select id="siteCategory" class="input-field w-full text-sm">
            <option value="常用网站">常用网站</option>
            <option value="社交媒体">社交媒体</option>
            <option value="购物网站">购物网站</option>
            <option value="娱乐网站">娱乐网站</option>
          </select>
        </div>
        
        <div class="flex justify-end gap-2.5">
          <button type="button" id="cancelBtn" class="btn-secondary px-3 py-1.5 text-sm">
            取消
          </button>
          <button type="submit" class="btn-primary px-3 py-1.5 text-sm">
            <span id="submitBtnText">添加</span>
          </button>
        </div>
      </form>
    </div>
  </div>
  
  <!-- 编辑分类模态框 -->
  <div id="categoryModal" class="fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center z-50 hidden animate-fade-in">
    <div class="glass-effect rounded-lg p-5 w-full max-w-md animate-slide-up">
      <div class="flex justify-between items-center mb-4">
        <h3 id="categoryModalTitle" class="text-lg font-medium">编辑分类</h3>
        <button id="closeCategoryModalBtn" class="p-1.5 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-full transition-colors duration-200">
          <i class="fa fa-times text-sm"></i>
        </button>
      </div>
      
      <div class="mb-3">
        <label for="newCategoryName" class="block text-xs font-medium mb-1.5">分类名称</label>
        <input type="text" id="newCategoryName" class="input-field w-full text-sm">
      </div>
      
      <div class="mb-4">
        <label class="block text-xs font-medium mb-1.5">网站列表</label>
        <div id="categorySitesList" class="max-h-48 overflow-y-auto space-y-1.5">
          <!-- 网站列表将在这里动态生成 -->
        </div>
      </div>
      
      <div class="flex justify-between gap-2.5">
        <button id="deleteCategoryBtn" class="px-3 py-1.5 border border-red-500 text-red-500 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors duration-200 text-sm">
          删除分类
        </button>
        <div class="flex gap-2.5">
          <button id="cancelCategoryBtn" class="btn-secondary px-3 py-1.5 text-sm">
            取消
          </button>
          <button id="saveCategoryBtn" class="btn-primary px-3 py-1.5 text-sm">
            保存
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 确认删除模态框 -->
  <div id="confirmDeleteModal" class="fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center z-50 hidden animate-fade-in">
    <div class="glass-effect rounded-lg p-5 w-full max-w-sm animate-slide-up">

      {

      },
      {

        category: '娱乐网站'
      }
    ];
    
    let categories = ['常用网站', '社交媒体', '购物网站', '娱乐网站'];
    let currentEditSiteId = null;
    let currentEditCategory = null;
    let siteToDelete = null;
    
    // DOM 元素
    const themeToggle = document.getElementById('themeToggle');
    const addSiteBtn = document.getElementById('addSiteBtn');
    const siteModal = document.getElementById('siteModal');
    const modalTitle = document.getElementById('modalTitle');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const siteForm = document.getElementById('siteForm');
    const siteId = document.getElementById('siteId');
    const siteName = document.getElementById('siteName');
    const siteUrl = document.getElementById('siteUrl');
    const siteDescription = document.getElementById('siteDescription');
    const siteIcon = document.getElementById('siteIcon');
    const siteCategory = document.getElementById('siteCategory');
    const cancelBtn = document.getElementById('cancelBtn');
    const submitBtnText = document.getElementById('submitBtnText');
    const categoryModal = document.getElementById('categoryModal');
    const categoryModalTitle = document.getElementById('categoryModalTitle');
    const closeCategoryModalBtn = document.getElementById('closeCategoryModalBtn');
    const newCategoryName = document.getElementById('newCategoryName');
    const categorySitesList = document.getElementById('categorySitesList');
    const deleteCategoryBtn = document.getElementById('deleteCategoryBtn');
    const cancelCategoryBtn = document.getElementById('cancelCategoryBtn');
    const saveCategoryBtn = document.getElementById('saveCategoryBtn');
    const confirmDeleteModal = document.getElementById('confirmDeleteModal');
    const confirmDeleteText = document.getElementById('confirmDeleteText');
    const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
    const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
    const exportDataBtn = document.getElementById('exportDataBtn');
    const importDataBtn = document.getElementById('importDataBtn');
    const importDataInput = document.getElementById('importDataInput');
    const notification = document.getElementById('notification');
    const notificationIcon = document.getElementById('notificationIcon');
    const notificationIconI = document.getElementById('notificationIconI');
    const notificationText = document.getElementById('notificationText');
    
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      // 加载本地存储的数据
      loadData();
      
      // 初始化主题
      initTheme();
      
      // 初始化事件监听
      initEventListeners();
      
      // 渲染分类
      renderCategories();
    });
    
    // 加载本地存储的数据
    function loadData() {
      const savedWebsites = localStorage.getItem('navsite-websites');
      const savedCategories = localStorage.getItem('navsite-categories');
      
      if (savedWebsites) {
        websites = JSON.parse(savedWebsites);
      }
      
      if (savedCategories) {
        categories = JSON.parse(savedCategories);
      }
    }
    
    // 保存数据到本地存储
    function saveData() {
      localStorage.setItem('navsite-websites', JSON.stringify(websites));
      localStorage.setItem('navsite-categories', JSON.stringify(categories));
    }
    
    // 初始化主题
    function initTheme() {
      const savedTheme = localStorage.getItem('navsite-theme') || 'light';
      
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    }
    
    // 切换主题
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('navsite-theme', isDark ? 'dark' : 'light');
      
      showNotification(
        isDark ? '已切换到暗黑模式' : '已切换到明亮模式',
        'success'
      );
    }
    
    // 初始化事件监听
    function initEventListeners() {
      // 主题切换
      themeToggle.addEventListener('click', toggleTheme);
      
      // 添加网站
      addSiteBtn.addEventListener('click', () => openSiteModal());
      
      // 关闭模态框
      closeModalBtn.addEventListener('click', closeSiteModal);
      cancelBtn.addEventListener('click', closeSiteModal);
      
      // 提交网站表单
      siteForm.addEventListener('submit', handleSiteFormSubmit);
      
      // 编辑分类
      document.querySelectorAll('.edit-category').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const category = e.currentTarget.dataset.category;
          openCategoryModal(category);
        });
      });
      
      // 关闭分类模态框
      closeCategoryModalBtn.addEventListener('click', closeCategoryModal);
      cancelCategoryBtn.addEventListener('click', closeCategoryModal);
      
      // 保存分类
      saveCategoryBtn.addEventListener('click', handleCategorySave);
      
      // 删除分类
      deleteCategoryBtn.addEventListener('click', () => {
        confirmDeleteModal.classList.remove('hidden');
        confirmDeleteText.textContent = `你确定要删除"${currentEditCategory}"分类吗？分类下的所有网站也将被删除。`;
        siteToDelete = { type: 'category', name: currentEditCategory };
      });
      
      // 关闭确认删除模态框
      cancelDeleteBtn.addEventListener('click', closeConfirmDeleteModal);
      
      // 确认删除
      confirmDeleteBtn.addEventListener('click', handleConfirmDelete);
      
      // 导出数据
      exportDataBtn.addEventListener('click', exportData);
      
      // 导入数据
      importDataBtn.addEventListener('click', () => importDataInput.click());
      importDataInput.addEventListener('change', handleImportData);
      
      // 点击模态框外部关闭
      siteModal.addEventListener('click', (e) => {
        if (e.target === siteModal) closeSiteModal();
      });
      
      categoryModal.addEventListener('click', (e) => {
        if (e.target === categoryModal) closeCategoryModal();
      });
      
      confirmDeleteModal.addEventListener('click', (e) => {
        if (e.target === confirmDeleteModal) closeConfirmDeleteModal();
      });
      
      // 键盘事件
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeSiteModal();
          closeCategoryModal();
          closeConfirmDeleteModal();
        }
      });
    }
    
    // 渲染分类
    function renderCategories() {
      // 清空现有分类
      const mainElement = document.querySelector('main');
      mainElement.innerHTML = '';
      
      // 为每个分类创建一个部分
      categories.forEach((category, index) => {
        const categoryWebsites = websites.filter(site => site.category === category);
        
        if (categoryWebsites.length === 0) return;
        
        const section = document.createElement('section');
        section.className = 'mb-8 animate-slide-up';
        section.style.animationDelay = `${0.1 * index}s`;
        
        section.innerHTML = `
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-medium flex items-center gap-2 text-gray-700 dark:text-gray-200">
              <i class="fa ${getCategoryIcon(category)} text-sm"></i>
              ${category}
            </h2>
            <button class="text-xs text-primary hover:text-primary/80 transition-colors duration-200 flex items-center gap-1 edit-category" data-category="${category}">
              <i class="fa fa-pencil text-xs"></i>
              <span>编辑</span>
            </button>
          </div>
          
          <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
            ${categoryWebsites.map(site => `
              <div class="website-card glass-effect rounded-lg p-3 flex flex-col items-center text-center card-hover group relative cursor-move" draggable="true" data-id="${site.id}">
                <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity duration-200 flex gap-1">
                  <button class="p-1 bg-white dark:bg-dark-card rounded-full shadow-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors duration-200 edit-site" data-id="${site.id}">
                    <i class="fa fa-pencil text-xs text-gray-600 dark:text-gray-400"></i>
                  </button>
                  <button class="p-1 bg-white dark:bg-dark-card rounded-full shadow-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors duration-200 delete-site" data-id="${site.id}">
                    <i class="fa fa-trash text-xs text-gray-600 dark:text-gray-400"></i>
                  </button>
                </div>
                <a href="${site.url}" target="_blank" class="flex flex-col items-center text-center w-full">
                  <div class="w-10 h-10 rounded-lg bg-white dark:bg-dark-card flex items-center justify-center mb-2 shadow-sm">
                    <img src="${site.icon}" alt="${site.name}" class="w-6 h-6 object-contain">
                  </div>
                  <h3 class="font-medium text-xs">${site.name}</h3>
                  <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-1 line-clamp-1">${site.description}</p>
                </a>
              </div>
            `).join('')}
          </div>
        `;
        
        mainElement.appendChild(section);
      });
      
      // 为动态生成的编辑和删除按钮添加事件监听
      document.querySelectorAll('.edit-site').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = e.currentTarget.dataset.id;
          openSiteModal(id);
        });
      });
      
      document.querySelectorAll('.delete-site').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = e.currentTarget.dataset.id;
          const site = websites.find(s => s.id === id);
          confirmDeleteModal.classList.remove('hidden');
          confirmDeleteText.textContent = `你确定要删除"${site.name}"吗？`;
          siteToDelete = { type: 'site', id };
        });
      });
      
      // 重新绑定编辑分类按钮事件
      document.querySelectorAll('.edit-category').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const category = e.currentTarget.dataset.category;
          openCategoryModal(category);
        });
      });
    }
    
    // 获取分类图标
    function getCategoryIcon(category) {
      switch(category) {
        case '常用网站': return 'fa-star text-yellow-500';
        case '社交媒体': return 'fa-comments text-blue-500';
        case '购物网站': return 'fa-shopping-cart text-orange-500';
        case '娱乐网站': return 'fa-film text-purple-500';
        default: return 'fa-folder text-gray-500';
      }
    }
    
    // 打开网站模态框
    function openSiteModal(id = null) {
      currentEditSiteId = id;
      
      if (id) {
        const site = websites.find(s => s.id === id);
        modalTitle.textContent = '编辑网站';
        submitBtnText.textContent = '保存';
        siteId.value = site.id;
        siteName.value = site.name;
        siteUrl.value = site.url;
        siteDescription.value = site.description;
        siteIcon.value = site.icon;
        siteCategory.value = site.category;
      } else {
        modalTitle.textContent = '添加网站';
        submitBtnText.textContent = '添加';
        siteForm.reset();
        siteCategory.value = '常用网站';
      }
      
      siteModal.classList.remove('hidden');
      siteName.focus();
    }
    
    // 关闭网站模态框
    function closeSiteModal() {
      siteModal.classList.add('hidden');
      currentEditSiteId = null;
    }
    
    // 处理网站表单提交
    function handleSiteFormSubmit(e) {
      e.preventDefault();
      
      const siteData = {
        id: currentEditSiteId || Date.now().toString(),
        name: siteName.value.trim(),
        url: siteUrl.value.trim(),
        description: siteDescription.value.trim(),
        icon: siteIcon.value.trim() || 'https://p3-doubao-search-sign.byteimg.com/labis/78209efdc96ff1b2c7273fd103f168dc~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1791278240&x-signature=tU%2B7TW28BhJ8KhN6E1JpJSqEKkk%3D',
        category: siteCategory.value
      };
      
      if (currentEditSiteId) {
        // 编辑现有网站
        const index = websites.findIndex(s => s.id === currentEditSiteId);
        websites[index] = siteData;
        showNotification('网站已更新', 'success');
      } else {
        // 添加新网站
        websites.push(siteData);
        showNotification('网站已添加', 'success');
      }
      
      saveData();
      renderCategories();
      closeSiteModal();
    }
    
    // 打开分类模态框
    function openCategoryModal(category) {
      currentEditCategory = category;
      categoryModalTitle.textContent = `编辑 ${category}`;
      newCategoryName.value = category;
      
      // 加载分类下的网站
      const categoryWebsites = websites.filter(site => site.category === category);
      categorySitesList.innerHTML = '';
      
      categoryWebsites.forEach(site => {
        const div = document.createElement('div');
        div.className = 'flex items-center justify-between glass-effect rounded p-2';
        div.innerHTML = `
          <div class="flex items-center gap-2">
            <img src="${site.icon}" alt="${site.name}" class="w-5 h-5 rounded">
            <span class="text-xs">${site.name}</span>
          </div>
          <div class="flex gap-1">
            <button class="p-1 hover:bg-gray-200 dark:hover:bg-gray-700 rounded transition-colors duration-200 edit-site" data-id="${site.id}">
              <i class="fa fa-pencil text-xs text-gray-600 dark:text-gray-400"></i>
            </button>
            <button class="p-1 hover:bg-gray-200 dark:hover:bg-gray-700 rounded transition-colors duration-200 delete-site" data-id="${site.id}">
              <i class="fa fa-trash text-xs text-gray-600 dark:text-gray-400"></i>
            </button>
          </div>
        `;
        categorySitesList.appendChild(div);
      });
      
      // 为分类模态框内的按钮添加事件监听
      categorySitesList.querySelectorAll('.edit-site').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.currentTarget.dataset.id;
          closeCategoryModal();
          setTimeout(() => openSiteModal(id), 300);
        });
      });
      
      categorySitesList.querySelectorAll('.delete-site').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.currentTarget.dataset.id;
          const site = websites.find(s => s.id === id);
          confirmDeleteModal.classList.remove('hidden');
          confirmDeleteText.textContent = `你确定要删除"${site.name}"吗？`;
          siteToDelete = { type: 'site', id };
        });
      });
      
      categoryModal.classList.remove('hidden');
      newCategoryName.focus();
    }
    
    // 关闭分类模态框
    function closeCategoryModal() {
      categoryModal.classList.add('hidden');
      currentEditCategory = null;
    }
    
    // 处理分类保存
    function handleCategorySave() {
      const newName = newCategoryName.value.trim();
      
      if (!newName) {
        showNotification('分类名称不能为空', 'error');
        return;
      }
      
      if (newName === currentEditCategory) {
        closeCategoryModal();
        return;
      }
      
      // 检查分类名称是否已存在
      if (categories.includes(newName)) {
        showNotification('分类名称已存在', 'error');
        return;
      }
      
      // 更新分类名称
      const index = categories.findIndex(c => c === currentEditCategory);
      categories[index] = newName;
      
      // 更新该分类下的所有网站
      websites.forEach(site => {
        if (site.category === currentEditCategory) {
          site.category = newName;
        }
      });
      
      saveData();
      renderCategories();
      closeCategoryModal();
      showNotification('分类已更新', 'success');
    }
    
    // 关闭确认删除模态框
    function closeConfirmDeleteModal() {
      confirmDeleteModal.classList.add('hidden');
      siteToDelete = null;
    }
    
    // 处理确认删除
    function handleConfirmDelete() {
      if (siteToDelete.type === 'site') {
        // 删除网站
        websites = websites.filter(site => site.id !== siteToDelete.id);
        showNotification('网站已删除', 'success');
      } else if (siteToDelete.type === 'category') {
        // 删除分类及旗下网站
        websites = websites.filter(site => site.category !== siteToDelete.name);
        categories = categories.filter(c => c !== siteToDelete.name);
        showNotification('分类已删除', 'success');
      }
      
      saveData();
      renderCategories();
      closeConfirmDeleteModal();
    }
    
    // 导出数据
    function exportData() {
      const data = {
        websites,
        categories
      };
      
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `导航数据_${new Date().toLocaleDateString()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      
      showNotification('数据已导出', 'success');
    }
    
    // 处理导入数据
    function handleImportData(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const data = JSON.parse(event.target.result);
          
          if (data.websites && Array.isArray(data.websites) && data.categories && Array.isArray(data.categories)) {
            websites = data.websites;
            categories = data.categories;
            saveData();
            renderCategories();
            showNotification('数据已导入', 'success');
          } else {
            showNotification('导入的数据格式不正确', 'error');
          }
        } catch (err) {
          showNotification('导入失败：' + err.message, 'error');
        }
      };
      
      reader.readAsText(file);
      importDataInput.value = '';
    }
    
    // 显示通知
    function showNotification(message, type = 'info') {
      notificationText.textContent = message;
      
      // 设置通知图标和颜色
      if (type === 'success') {
        notificationIcon.className = 'w-5 h-5 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center text-green-600 dark:text-green-400 text-xs';
        notificationIconI.className = 'fa fa-check';
      } else if (type === 'error') {
        notificationIcon.className = 'w-5 h-5 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center text-red-600 dark:text-red-400 text-xs';
        notificationIconI.className = 'fa fa-times';
      } else {
        notificationIcon.className = 'w-5 h-5 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600 dark:text-blue-400 text-xs';
        notificationIconI.className = 'fa fa-info';
      }
      
      // 显示通知
      notification.classList.remove('translate-x-full');
      
      // 3秒后隐藏
      setTimeout(() => {
        notification.classList.add('translate-x-full');
      }, 3000);
    }
  </script>
</body>
